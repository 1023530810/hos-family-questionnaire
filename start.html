<!DOCTYPE html>

<head>

<title>香港居屋家庭问卷入口</title>
<style>
body{font-family:system-ui,sans-serif;max-width:720px;margin:40px auto;padding:0 16px;line-height:1.6;color:#0f172a}
a.btn{display:inline-block;background:#2563eb;color:#fff;padding:12px 18px;border-radius:10px;text-decoration:none;margin:8px 8px 8px 0}
.box{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:14px;margin:16px 0}
.box2{background:#eff6ff;border:1px solid #93c5fd;border-radius:12px;padding:14px;margin:16px 0}
code{background:#f1f5f9;padding:2px 6px;border-radius:4px}
</style>

<body>
<h1>香港居屋家庭问卷</h1>
<p>5 人（父亲、母亲、本人、姐姐、弟弟）+ 1 份家庭通用卷。</p>
<p><a class="btn" href="./index.html">开始填写</a></p>
<div class="box2">
  <strong>已申请、分配已下来？</strong>
  <p>通用信息里「批次介绍 / 有没有申请」<b>不用再填</b>。打开 G0 后优先填顶部 <b>R0–R9（申请与分配结果）</b>，再填资金与地区。</p>
</div>
<div class="box">
  <strong>云端提交</strong>
  <ol>
    <li>填完后点 <code>提交到云端（生成链接）</code></li>
    <li>把链接发回对话（「读取答卷」+ 链接）</li>
  </ol>
</div>
</body>
